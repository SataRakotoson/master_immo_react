    <style>
      @font-face {
        font-family: "Ringside";
        src: url("/font/ringsideregular-book-webfont.woff2") format("woff2"),
          url("/font/RingsideRegular-Book.woff2") format("woff2");
        font-weight: 300;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Ringside";
        src: url("/font/ringsideregular-book-webfont.woff2") format("woff2"),
          url("/font/RingsideRegular-Book.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      .js img.lazyload:not([src]) { visibility: hidden; }
      body > section.new-launch-section { position: relative; z-index: 10; isolation: isolate; }
      .latest-launch-section .amenities-lists > i[class*="flaticon"] {
        font-size: 32px; line-height: 1; color: #000;
        display: flex; align-items: center; justify-content: center;
      }
      .new-launch-section .latest-launch-slider .new-launch-banner {
        width: 100vw; max-width: 100vw;
        margin-left: calc(50% - 50vw); margin-right: calc(50% - 50vw); position: relative;
      }
      .new-launch-section .latest-launch-slider .new-launch-banner a { display: block; width: 100%; }
      .new-launch-section .latest-launch-slider .new-launch-banner img.img-100 {
        width: 100%; height: auto; display: block; object-fit: cover;
      }
      .key-numbers-section { background: #fff; padding-top: 49px; padding-bottom: 49px; }
      .key-numbers-section .key-numbers-value {
        display: block; font-family: 'Gilda Display', serif;
        font-size: clamp(2.75rem, 6vw, 3.75rem); font-weight: 400;
        line-height: 1.1; color: #222; margin-bottom: 0.35em;
      }
      .key-numbers-section .key-numbers-label {
        font-family: 'Barlow Condensed', sans-serif; font-size: 15px;
        font-weight: 400; letter-spacing: 3px; text-transform: uppercase;
        color: #666; margin: 0; max-width: 280px; margin-left: auto; margin-right: auto;
      }
      header .nav-links a.level-1-menu { display: inline; line-height: normal; }
      header .account-dropdown .header-dropdown-toggle {
        display: inline-flex; align-items: center; justify-content: center;
        gap: 6px; cursor: pointer; list-style: none; color: #fff;
        font-family: 'Barlow Condensed', sans-serif; font-size: 15px;
        letter-spacing: 0.12em; text-transform: uppercase;
      }
      header .account-dropdown .header-dropdown-toggle::-webkit-details-marker { display: none; }
      header .account-dropdown { position: relative; }
      header .account-dropdown .header-dropdown-menu {
        position: absolute; right: 0; top: calc(100% + 8px);
        min-width: 200px; margin: 0; padding: 8px 0; list-style: none;
        background: #fff; box-shadow: 0 8px 24px rgba(0,0,0,.12); z-index: 1200;
      }
      header .account-dropdown .header-dropdown-menu a {
        display: block; padding: 10px 18px; color: #00205b;
        font-family: 'Barlow', sans-serif; font-size: 15px;
        text-decoration: none; text-transform: none; letter-spacing: normal;
      }
      header .account-dropdown .header-dropdown-menu a:hover { background: rgba(0,32,91,.06); }
      header .account-dropdown .header-dropdown-chevron { font-size: 10px; opacity: .85; }
      @media (min-width:1200px) {
        header .menu-right.menu-links { flex-wrap: nowrap; }
        header .menu-right .nav-links { flex-wrap: nowrap; }
      }
      @media (min-width:768px) {
        .home-slider.slider-static .swiper { overflow: visible; }
        .home-slider.slider-static .swiper-wrapper { flex-wrap: wrap; gap: 20px; transform: none !important; }
        .home-slider.slider-static .swiper-slide { width: calc(50% - 10px) !important; height: auto; margin-right: 0 !important; }
        .home-slider.slider-static .common-arrow { display: none; }
      }
      @media (min-width:1200px) {
        .home-slider.slider-static .swiper-slide { width: calc(33.333% - 13.34px) !important; }
      }
      .fixed-header.header-at-top header {
        background-color: transparent; -webkit-backdrop-filter: none;
        backdrop-filter: none; box-shadow: none;
      }
      .fixed-header.header-at-top header.white-header {
        background-color: transparent; -webkit-backdrop-filter: none; backdrop-filter: none;
      }
